<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Kactuif Disaster Simulation</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/topojson@3"></script>
    <script src="assets/json/mapping.js"></script>
    <script src="script.js"></script>
</head>
<body>
    <iframe src="map.html" id="map-frame"></iframe>

    <div id="ui-layer">
        <img src="assets/label/back.png" id="bg-labels">
        
        <div class="data-overlay" id="time-val">---</div>
        <div class="data-overlay" id="mag-val">---</div>
        <div class="data-overlay" id="hypo-val">---</div>
        <div class="data-overlay" id="depth-val">---</div>
        
        <div id="max-scale-container"></div>

        <div id="info-banner-container">
            <img src="assets/banner/tm_n.png" id="status-tsunami" class="banner-item tsunami-banner">
            
            <img src="assets/banner/eew.png" id="status-eew" class="banner-item">
            <img src="assets/banner/enchi.png" id="status-enchi" class="banner-item">
        </div>
    </div>
</body>
</html>

name: Take Map Screenshot

on:
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 警告を消すために24に変更

      - name: Install dependencies
        run: npm install puppeteer

      # ★ここを追加：Puppeteer(Chromium)に必要なライブラリをインストール
      - name: Install Puppeteer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgbm-dev \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libxkbcommon0 \
            libasound2 \
            libpangocairo-1.0-0 \
            libxshmfence1

      - name: Run screenshot script
        run: node screenshot.js

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: map-snapshot
          path: map-snapshot.png

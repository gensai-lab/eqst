name: Take Map Screenshot

on:
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 重要：コミットするために必要
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install # npm ci ではなく npm install に変更

      - name: Install Puppeteer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxcomposite1 libxdamage1 libxrandr2 libxkbcommon0 libasound2t64 libpangocairo-1.0-0 libxshmfence1

      - name: Run screenshot script
        run: node screenshot.js

      # 自動コミット設定
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add screenshots/
          # 変更がある場合のみコミット
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-screenshot: Update map images" && git push)

name: Take Map Screenshot

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Discordに送信する地震情報メッセージ'
        required: true

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }
      - run: npm install
      - run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxcomposite1 libxdamage1 libxrandr2 libxkbcommon0 libasound2t64 libpangocairo-1.0-0 libxshmfence1
      
      # 撮影実行
      - run: node screenshot.js
      
      # 画像保存
      - name: Commit and push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add screenshots/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-screenshot" && git push)

      # Discordへの通知ステップ
      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          IMAGE_FILE=$(ls -t screenshots/*.png | head -n1)
          # GitHub Actionsのinputからメッセージを取得
          MESSAGE="${{ github.event.inputs.message }}"
          
          # Discordに投稿
          curl -H "Content-Type: multipart/form-data" \
          -F "content=$MESSAGE" \
          -F "file1=@$IMAGE_FILE" \
          $DISCORD_WEBHOOK

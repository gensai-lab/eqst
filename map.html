<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0d1a3a; }
        #map { width: 100vw; height: 100vh; }
        .region { stroke: #fff; stroke-width: 0.5px; fill: #444; }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    <script src="assets/json/mapping.js"></script>
</head>
<body>
    <svg id="map"></svg>

    <script>
        const svg = d3.select("#map");
        // 日本地図用プロジェクション（位置調整が必要な場合はここを調整）
        const projection = d3.geoMercator().center([137, 36]).scale(2000).translate([window.innerWidth/2, window.innerHeight/2]);
        const path = d3.geoPath().projection(projection);

        // 初期表示
        function initMap() {
            // mapping.js内のデータ変数名が 'mapData' だと仮定しています
            // ※mapping.js内の変数名に合わせて調整してください
            if (typeof mapData !== 'undefined') {
                svg.selectAll("path")
                   .data(topojson.feature(mapData, mapData.objects.pref).features)
                   .enter().append("path")
                   .attr("d", path)
                   .attr("class", "region")
                   .attr("id", d => d.properties.name);
            }
        }

        // 親画面 (index.html) からのデータ受信
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'UPDATE_MAP') {
                updateMap(event.data.data);
            }
        });

        // データに応じた色付け処理
        function updateMap(data) {
            console.log("地図更新データ:", data);
            // ここに震度ごとの色付けロジックを記述します
            // 例: data.earthquake.intensity...
        }

        initMap();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    <script src="assets/json/mapping.js"></script>
    <style>
        body { margin: 0; background: #0d1a3a; }
        .region { stroke: #fff; stroke-width: 0.5px; fill: #444; }
    </style>
</head>
<body>
    <svg id="map" width="100vw" height="100vh"></svg>
    <script>
        // 【重要】 mapping.jsの中にある変数名を指定してください
        // 例えば mapping.js が 'const kactuifMap = { ... }' なら、ここも kactuifMap に変える必要があります
        const data = typeof mapData !== 'undefined' ? mapData : null; 

        if (data) {
            const svg = d3.select("#map");
            const projection = d3.geoMercator().center([137, 36]).scale(2000).translate([500, 400]);
            const path = d3.geoPath().projection(projection);

            // 【重要】 data.objects.XXXX の XXXX が mapping.js の中身と一致しているか要確認
            // コンソールで data.objects を確認してください
            const key = Object.keys(data.objects)[0]; 
            
            svg.selectAll("path")
               .data(topojson.feature(data, data.objects[key]).features)
               .enter().append("path")
               .attr("d", path)
               .attr("class", "region");
        } else {
            console.error("地図データが見つかりません。mapping.jsの変数名を確認してください。");
        }
    </script>
</body>
</html>

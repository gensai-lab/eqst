<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Map Viewer</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0d1a3a; }
        #map-container { width: 100vw; height: 100vh; cursor: grab; }
        .pref-layer { fill: #2c3e50; stroke: #34495e; stroke-width: 0.5px; }
        .saibun-layer { fill: none; stroke: #4b5f73; stroke-width: 0.3px; pointer-events: none; }
        /* アイコンがズーム操作の邪魔にならないように */
        .intensity-icon, .shingen-icon { pointer-events: none; }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
</head>
<body>
    <svg id="map-container">
        <g id="map-content"></g>
    </svg>

    <script>
        // グローバル変数として定義 (map_logic.jsから参照するため)
        window.projection = d3.geoMercator().center([137, 36]).scale(2000).translate([window.innerWidth/2, window.innerHeight/2]);
        const path = d3.geoPath().projection(window.projection);
        const mapContent = d3.select("#map-content");

        // 地図ファイルの読み込みと描画
        Promise.all([
            d3.json("assets/json/todoufuken.json"),
            d3.json("assets/json/saibun.json")
        ]).then(([prefData, saibunData]) => {
            const prefKey = Object.keys(prefData.objects)[0];
            const saibunKey = Object.keys(saibunData.objects)[0];

            mapContent.append("g").selectAll("path").data(topojson.feature(prefData, prefData.objects[prefKey]).features).enter().append("path").attr("d", path).attr("class", "pref-layer");
            mapContent.append("g").selectAll("path").data(topojson.feature(saibunData, saibunData.objects[saibunKey]).features).enter().append("path").attr("d", path).attr("class", "saibun-layer");
            
            console.log("地図の基本描画が完了しました。");
        });
    </script>

    <script src="assets/json/mapping.js"></script>
    <script src="map_logic.js"></script>
</body>
</html>

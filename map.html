<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Map Viewer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    <style>
        body { margin: 0; background: #0d1a3a; overflow: hidden; }
        svg { width: 100vw; height: 100vh; }
        /* 都道府県レイヤー */
        .pref-layer { fill: #333; stroke: #555; stroke-width: 0.5px; }
        /* 細分区域レイヤー */
        .saibun-layer { fill: none; stroke: #fff; stroke-width: 0.3px; pointer-events: none; }
    </style>
</head>
<body>
    <svg id="map"></svg>

    <script>
        const svg = d3.select("#map");
        const projection = d3.geoMercator().center([137, 36]).scale(2000).translate([window.innerWidth/2, window.innerHeight/2]);
        const path = d3.geoPath().projection(projection);

        // 2つのファイルを同時に読み込む
        Promise.all([
            d3.json("assets/json/todoufuken.json"),
            d3.json("assets/json/saibun.json")
        ]).then(([prefData, saibunData]) => {
            
            // --- 1. 都道府県レイヤーの描画 ---
            // ※ .objects.XXXX の XXXX を実際のキー名に変えてください
            const prefKey = Object.keys(prefData.objects)[0]; 
            svg.append("g")
               .selectAll("path")
               .data(topojson.feature(prefData, prefData.objects[prefKey]).features)
               .enter().append("path")
               .attr("d", path)
               .attr("class", "pref-layer");

            // --- 2. 細分区域レイヤーの描画 ---
            const saibunKey = Object.keys(saibunData.objects)[0];
            svg.append("g")
               .selectAll("path")
               .data(topojson.feature(saibunData, saibunData.objects[saibunKey]).features)
               .enter().append("path")
               .attr("d", path)
               .attr("class", "saibun-layer");

        }).catch(err => {
            console.error("地図データの読み込みに失敗しました:", err);
        });
    </script>
</body>
</html>
